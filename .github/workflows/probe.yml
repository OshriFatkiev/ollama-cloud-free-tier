name: Probe free cloud models

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Optional single model to probe, for example glm-5.1:cloud"
        required: false
        type: string
      max_models:
        description: "Maximum models to probe when model is empty"
        required: false
        default: "100"
        type: string
      delay_seconds:
        description: "Delay seconds between probes"
        required: false
        default: "3"
        type: string
      max_search_pages:
        description: "Maximum public cloud search pages to inspect"
        required: false
        default: "10"
        type: string
      max_family_pages:
        description: "Maximum model family pages to inspect"
        required: false
        default: "100"
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  probe:
    runs-on: ubuntu-latest

    env:
      OLLAMA_API_KEY: ${{ secrets.OLLAMA_FREE_API_KEY }}
      INPUT_MODEL: ${{ inputs.model }}
      INPUT_MAX_MODELS: ${{ inputs.max_models }}
      INPUT_DELAY_SECONDS: ${{ inputs.delay_seconds }}
      INPUT_MAX_SEARCH_PAGES: ${{ inputs.max_search_pages }}
      INPUT_MAX_FAMILY_PAGES: ${{ inputs.max_family_pages }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Discover cloud models
        run: |
          uv run python scripts/discover.py \
            --max-search-pages "$INPUT_MAX_SEARCH_PAGES" \
            --max-family-pages "$INPUT_MAX_FAMILY_PAGES"

      - name: Probe models
        run: |
          if [ -n "$INPUT_MODEL" ]; then
            uv run python scripts/probe.py \
              --model "$INPUT_MODEL" \
              --delay-seconds "$INPUT_DELAY_SECONDS"
          else
            uv run python scripts/probe.py \
              --all \
              --max "$INPUT_MAX_MODELS" \
              --delay-seconds "$INPUT_DELAY_SECONDS"
          fi

      - name: Render README
        run: uv run python scripts/render_readme.py

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/update-free-model-status
          title: "Update Free-tier Ollama cloud model status"
          commit-message: "Update Free-tier Ollama cloud model status"
          body: "Updates discovered cloud models and Free-tier probe results."
